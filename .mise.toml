[settings]
install_before = "3d"

[tools]
go = "1.26.3"
"github:golangci/golangci-lint" = "2.11.3"
"github:mfridman/tparse" = "0.18.0"
"github:mvdan/gofumpt" = "0.9.2"
"github:k1LoW/octocov" = "0.75.4"
"github:goreleaser/goreleaser" = "2.14.3"
bun = "1.3.11"

[tasks.test]
description = "Run all tests with tparse"
run = "go test ./... -json | tparse -all"

[tasks.fmt]
description = "Format with gofumpt"
run = "gofumpt -l -w ."

[tasks.fix]
description = "Run go fix (modernize)"
run = "go fix ./..."

[tasks.lint]
description = "Run golangci-lint with --fix"
run = "golangci-lint run --fix"

[tasks.build]
description = "Build binary"
run = "go build -o commd ."

[tasks.tidy]
description = "Run go mod tidy -v"
run = "go mod tidy -v"

[tasks.vuln]
description = "Verify module checksums and run govulncheck"
run = [
    "go mod verify",
    "go run golang.org/x/vuln/cmd/govulncheck@latest ./...",
]

[tasks.cov]
description = "Run tests with coverage"
env = { CI = "1", GITHUB_REPOSITORY = "koh-sh/commd" }
run = [
    "go test -cover ./... -coverprofile=coverage.out",
    "go tool cover -html=coverage.out -o cover.html",
    "octocov",
    "rm coverage.out",
]

[tasks.ci]
description = "Run full CI pipeline (fmt -> fix -> lint -> build -> cov -> e2e-basic)"
run = [
    { task = "fmt" },
    { task = "fix" },
    { task = "lint" },
    { task = "build" },
    { task = "cov" },
    { task = "e2e-basic" },
]

[tasks.e2e]
description = "Run all E2E tests with tuistory (full suite)"
depends = ["build"]
dir = "e2e"
run = ["bun install", "bun test"]

[tasks.e2e-basic]
description = "Run basic E2E tests (critical path only)"
depends = ["build"]
dir = "e2e"
run = ["bun install", "bun test tests/navigation.test.ts tests/comment.test.ts tests/confirm.test.ts tests/confirm-accept.test.ts tests/help.test.ts tests/search.test.ts tests/viewed.test.ts tests/pr.test.ts"]

[tasks.install-skills]
description = "Install tuistory Claude Code skill"
run = "npx skills add https://github.com/remorses/tuistory --skill tuistory"

[tasks.upgrade-tools]
description = "Upgrade dev tools managed by mise to latest versions"
run = "mise up --local --bump"
